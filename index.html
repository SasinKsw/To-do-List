<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Smart To-Do List</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f8fc;
      --white: #ffffff;
      --border: #e8eaf2;
      --border2: #d0d4e8;
      --text: #1a1a2e;
      --muted: #6b7280;
      --faint: #9ca3af;
      --radius: 14px;
      --radius-sm: 9px;
      --shadow: 0 2px 12px rgba(99,102,241,0.08);
      --shadow2: 0 4px 24px rgba(99,102,241,0.13);

      --todo-bg: #eff6ff; --todo-text: #2563eb; --todo-border: #bfdbfe;
      --prog-bg: #faf5ff; --prog-text: #7c3aed; --prog-border: #ddd6fe;
      --done-bg: #f0fdf4; --done-text: #16a34a; --done-border: #bbf7d0;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem 1rem 4rem;
    }

    .container { max-width: 520px; margin: 0 auto; }

    /* Header */
    .header { margin-bottom: 1.25rem; }
    .app-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: #7c3aed; background: #f3f0ff;
      padding: 4px 12px; border-radius: 99px; margin-bottom: 10px;
      font-weight: 600;
    }
    h1 { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .subtitle { font-size: 13px; color: var(--muted); }

    /* Backup Buttons */
    .backup-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .btn-backup {
      flex: 1; padding: 8px; font-size: 12px; font-weight: 600;
      background: var(--white); border: 1px solid var(--border2);
      border-radius: var(--radius-sm); cursor: pointer; color: var(--muted);
      transition: all 0.2s;
    }
    .btn-backup:hover { background: #f9fafb; border-color: #9ca3af; }

    /* Date nav */
    .date-nav {
      display: flex; align-items: center; gap: 8px;
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 8px 10px;
      margin-bottom: 1.25rem; box-shadow: var(--shadow);
    }
    .btn-nav {
      background: var(--bg); border: 1px solid var(--border2);
      border-radius: var(--radius-sm); width: 34px; height: 34px;
      cursor: pointer; font-size: 15px; color: var(--text);
      display: flex; align-items: center; justify-content: center;
    }
    .btn-nav:hover { background: #eff6ff; border-color: #bfdbfe; }
    .cur-date { flex: 1; text-align: center; font-size: 14px; font-weight: 600; color: var(--text); }
    .btn-today {
      background: #eff6ff; border: 1px solid #bfdbfe;
      border-radius: var(--radius-sm); padding: 5px 12px;
      font-size: 12px; cursor: pointer; color: #2563eb; font-family: inherit; font-weight: 500;
    }
    .btn-today:hover { background: #dbeafe; }

    /* Overview */
    .overview {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }
    .overview-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
    .overview-body { display: flex; gap: 1.25rem; align-items: center; }
    .pie-wrap { flex-shrink: 0; position: relative; width: 120px; height: 120px; }
    .pie-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .pie-pct { font-size: 22px; font-weight: 700; color: #7c3aed; }
    .pie-label { font-size: 10px; color: var(--muted); font-weight: 500; }

    .stats-right { flex: 1; display: flex; flex-direction: column; gap: 7px; }
    .stat-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border-radius: var(--radius-sm);
    }
